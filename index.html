<!DOCTYPE html>
<html lang="es">
 <head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Remilia" />
  <meta name="description" content="Chatlog Magician para Shinobi Gaiden hecho por Remilia" />
  <meta name="keywords" content="Shinobi Gaiden, SG, roleplay, SAMP, OPENMP, chatlog magician, chatlog" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="msapplication-navbutton-color" content="#000000" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>SG Chatlog Magician</title>

  <!-- Preload critical assets -->
  <link rel="preload" href="css/foundation.fixed.css" as="style" />
  <link rel="preload" href="js/app.js" as="script" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/foundation.fixed.css" />
  <link rel="stylesheet" href="css/modern.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/fontawesome.min.css" />
  <link rel="stylesheet" href="color-palette/color-palette.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
        crossorigin="anonymous" />
  <link rel="icon" href="favicon.png" type="image/png" />

  <!-- Error handling and cross-origin fixes -->
  <!-- Config is loaded via defaults in error-logger.js or Vercel environment variables -->
  <script src="js/error-logger.js" defer></script>
  <script src="js/error-handler.js" defer></script>
  <script src="js/cross-origin-fix.js" defer></script>
  <script src="js/cors-handler.js" defer></script>

  <style>
   label {
    display: none;
   }

   ::-webkit-input-placeholder {
    color: black;
   }

   :-ms-input-placeholder {
    color: black;
   }

   ::placeholder {
    color: black;
   }

   #chatlogInput::placeholder {
    color: transparent;
   }

   .button .bmc-btn,
   .bmc-btn {
     background-color: transparent !important;
     min-width: auto !important;
     height: 38px !important;
     padding: 0 12px !important;
     line-height: 1 !important;
   }
  </style>
 </head>
 <body>
    <div class="grid-container">
        <div class="grid-x grid-margin-x">
           <div class="cell small-12">
              <div class="grid-x grid-margin-x align-middle">
                 <div class="cell small-4 medium-2">
                    <label for="font-label">Tamaño de fuente:</label>
                    <input name="font-label" id="font-label" type="number" min="8" max="24" step="1" value="12" aria-label="Tamaño de fuente" />
                    <div class="golden-sizes-hint">Golden: 8, 10, 12, 15, 19, 24px</div>
                 </div>
                 <div class="cell small-4 medium-2">
                    <label for="lineLengthInput">Largo de línea:</label>
                    <input type="number" id="lineLengthInput" min="1" value="77" aria-label="Largo de línea">
                 </div>
                 <div class="cell small-8 medium-8">
                    <label for="characterNameInput">Filtro por nombre de personaje:</label>
                    <div class="input-group" style="position: relative;">
                      <input type="text" id="characterNameInput" placeholder="Nombre del personaje" autocomplete="off" aria-label="Filtro por nombre de personaje" />
                      <div class="input-group-button" style="display: flex; gap: 4px;">
                        <button class="button small" id="addCharacterBtn" type="button" aria-label="Añadir personaje">Añadir</button>
                        <button class="button small" id="showCharacterListBtn" type="button" aria-label="Mostrar lista de personajes">&#9660;</button>
                      </div>
                      <div id="characterNameDropdown" class="character-dropdown" style="display: none; position: absolute; top: 110%; left: 0; right: 0; background: #222; color: #fff; border: 1px solid #444; z-index: 1000; max-height: 150px; overflow-y: auto;" role="listbox"></div>
                    </div>
                 </div>
              </div>
              <label for="chatlogInput">Chat Log:</label>
              <div class="textarea-container">
                 <textarea id="chatlogInput" class="form-control textarea-input" rows="15" placeholder="Pega tu chatlog aquí..." aria-label="Entrada de chatlog"></textarea>
              </div>
              <div class="grid-x grid-margin-x align-middle">
                 <div class="cell auto">
                    <button id="downloadOutputTransparent" class="button success" aria-label="Descargar chatlog">Descargar</button>
                    <button id="toggleBackground" class="button">Alternar Fondo</button>
                    <button id="toggleCharacterNameColoring" class="button" aria-label="Alternar colores por nombre" title="Distinguir diálogos por nombre de personaje">Distinguir Nombres</button>
                    <button id="censorCharButton" class="button secondary censor-char-button" aria-label="Copiar carácter de censura" title="Copiar carácter ÷">÷</button>
                    <button id="toggleColorPalette" class="button" aria-label="Alternar paleta de colores" title="Clic en texto para colorear">Colorear</button>
                 </div>
              </div>

              <div id="output" class="output" role="region" aria-label="Chatlog formateado"></div>

              <!-- Crear Imagen: composición con imagen de fondo y marcos cinematográficos -->
              <div class="cinema-composer-section">
                <div class="cinema-composer-header" role="button" tabindex="0" aria-expanded="false" aria-controls="cinemaComposerBody">
                  <i class="fas fa-image" aria-hidden="true"></i> Crear Imagen
                  <span class="cinema-toggle-icon"><i class="fas fa-chevron-down"></i></span>
                </div>
                <div id="cinemaComposerBody" class="cinema-composer-body" style="display: none;">
                  <div class="grid-x grid-margin-x align-middle">
                    <!-- Imagen de fondo -->
                    <div class="cell small-12 medium-6">
                      <div class="cinema-group">
                        <h4><i class="fas fa-image"></i> Imagen de Fondo</h4>
                        <input type="file" id="bgImageInput" accept="image/*" style="display:none" />
                        <button id="bgImageBtn" class="button" type="button" aria-label="Importar imagen de fondo">
                          <i class="fas fa-upload"></i> Importar Imagen
                        </button>
                        <button id="bgImageClearBtn" class="button alert small" type="button" style="display:none" aria-label="Quitar imagen de fondo">
                          <i class="fas fa-times"></i> Quitar
                        </button>
                      </div>
                    </div>

                    <!-- Posición del chatlog -->
                    <div class="cell small-12 medium-6">
                      <div class="cinema-group">
                        <h4><i class="fas fa-arrows-alt"></i> Posición del Chatlog</h4>
                        <div class="cinema-control">
                          <label for="chatlogPosX">Horizontal (X):</label>
                          <input type="range" id="chatlogPosX" min="0" max="100" step="0.1" value="5" aria-label="Posición horizontal del chatlog" />
                          <span id="chatlogPosXVal" class="range-val">5%</span>
                        </div>
                        <div class="cinema-control">
                          <label for="chatlogPosY">Vertical (Y):</label>
                          <input type="range" id="chatlogPosY" min="0" max="100" step="0.1" value="50" aria-label="Posición vertical del chatlog" />
                          <span id="chatlogPosYVal" class="range-val">50%</span>
                        </div>
                        <div class="cinema-control">
                          <label for="chatlogScale">Escala:</label>
                          <input type="range" id="chatlogScale" min="10" max="200" step="0.5" value="100" aria-label="Escala del chatlog" />
                          <span id="chatlogScaleVal" class="range-val">100%</span>
                        </div>
                      </div>
                    </div>

                    <!-- Recorte de imagen -->
                    <div class="cell small-12 medium-6">
                      <div class="cinema-group">
                        <h4><i class="fas fa-crop-alt"></i> Recorte de Imagen</h4>
                        <div class="cinema-control cinema-crop-resolution">
                          <label>Resolución:</label>
                          <input type="number" id="cropWidth" min="100" max="7680" value="1920" class="cinema-crop-input" aria-label="Ancho del recorte" />
                          <span class="cinema-crop-x">&times;</span>
                          <input type="number" id="cropHeight" min="100" max="4320" value="1080" class="cinema-crop-input" aria-label="Alto del recorte" />
                          <span class="range-val">px</span>
                          <button id="cropResetBtn" class="cinema-crop-reset-btn" type="button" aria-label="Usar resolución original" title="Restaurar resolución original">
                            <i class="fas fa-undo"></i>
                          </button>
                        </div>
                        <div class="cinema-control">
                          <label for="cropOffsetY">Pos. vertical:</label>
                          <input type="range" id="cropOffsetY" min="0" max="100" step="0.1" value="50" aria-label="Posición vertical de la imagen dentro del recorte" />
                          <span id="cropOffsetYVal" class="range-val">50%</span>
                        </div>
                        <div class="cinema-control">
                          <label for="cropOffsetX">Pos. horizontal:</label>
                          <input type="range" id="cropOffsetX" min="0" max="100" step="0.1" value="50" aria-label="Posición horizontal de la imagen dentro del recorte" />
                          <span id="cropOffsetXVal" class="range-val">50%</span>
                        </div>
                      </div>
                    </div>

                    <!-- Marco cinematográfico -->
                    <div class="cell small-12 medium-6">
                      <div class="cinema-group">
                        <h4><i class="fas fa-border-all"></i> Marco Cinematográfico</h4>
                        <div class="cinema-frame-presets">
                          <button class="cinema-frame-btn active" data-frame="none" title="Sin marco">Ninguno</button>
                          <button class="cinema-frame-btn" data-frame="letterbox-239" title="Letterbox 2.39:1 (Scope)">2.39:1</button>
                          <button class="cinema-frame-btn" data-frame="letterbox-185" title="Letterbox 1.85:1 (Flat)">1.85:1</button>
                          <button class="cinema-frame-btn" data-frame="letterbox-21" title="Letterbox 2.1:1 (IMAX)">2.1:1</button>
                          <button class="cinema-frame-btn" data-frame="4-3" title="4:3 Pillarbox (Clásico)">4:3</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Preview compuesto (HTML en vivo) -->
                  <div class="cinema-preview-container" id="cinemaPreviewContainer" style="display:none;">
                    <h4><i class="fas fa-eye"></i> Vista Previa</h4>
                    <div id="cinemaLivePreview" class="cinema-live-preview">
                      <img id="cinemaLivePreviewBg" class="cinema-live-bg" alt="" />
                      <div id="cinemaLivePreviewChatlog" class="cinema-live-chatlog"></div>
                      <div id="cinemaLiveBarTop" class="cinema-live-bar cinema-live-bar-top"></div>
                      <div id="cinemaLiveBarBottom" class="cinema-live-bar cinema-live-bar-bottom"></div>
                    </div>
                  </div>

                  <div class="cinema-actions">
                    <button id="cinemaExportBtn" class="button success large" type="button" disabled aria-label="Exportar imagen">
                      <i class="fas fa-download"></i> Exportar Imagen
                    </button>
                  </div>
                </div>
              </div>
           </div>
        </div>
     </div>

    <!-- Third-party scripts with fallback handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/4.0.0-beta.2/jquery.min.js" 
            integrity="sha512-JobWAqYk5CSjWuVV3mxgS+MmccJqkrBaDhk8SKS1BW+71dJ9gzascwzW85UwGhxiSyR7Pxhu50k+Nl3+o5I49A==" 
            crossorigin="anonymous" 
            defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/foundation/6.9.0/js/foundation.min.js" 
            integrity="sha512-P4f0g0iAkyfUF2V2VX8dxkoBxPLULaV2TM8HQGXFRb75AzLVAf+sn+MRweu/C81rL2JaYutbY6cWAbmwJbtOcg==" 
            crossorigin="anonymous" 
            defer
            onerror="console.warn('Foundation.js failed to load from CDN')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.5.0/dom-to-image-more.min.js" 
            integrity="sha512-ECdKPIiMdaihsCUpvDKFdrwwERCqyqojP0H1SV9J9k6/80yAzfHzhcA5xaexoNMR9JZSJ7gmzMkV/08Ie1asmw==" 
            crossorigin="anonymous" 
            defer
            onerror="console.warn('dom-to-image-more.js failed to load from CDN')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" 
            integrity="sha512-Qlv6VSKh1gDKGoJbnyA5RMXYcvnpIqhO++MhIM2fStMcGT9i2T//tSwYFlcyoRRDcDZ+TYHpH8azBBCyhpSeqw==" 
            crossorigin="anonymous" 
            defer
            onerror="console.warn('FileSaver.js failed to load from CDN')"></script>

    <!-- Application scripts -->
    <script src="js/chat.js" defer></script>
     <script src="color-palette/color-palette.js" defer></script>
     <script src="js/chatlog-parser.js" defer></script>
     <script src="js/app.js" defer></script>
     <script src="js/cinema-composer.js" defer></script>

     <!-- History panel -->
     <div class="history-tab" 
          onclick="toggleHistoryPanel()" 
          role="button" 
          tabindex="0" 
          aria-label="Abrir historial de chatlogs" 
          aria-expanded="false">
       <i class="fas fa-clock-rotate-left" aria-hidden="true"></i>
     </div>

     <div id="historyPanel" 
          class="history-panel" 
          role="dialog" 
          aria-label="Historial de chatlogs" 
          aria-hidden="true">
       <div class="history-header">
         <h3>Historial de Chatlogs</h3>
       </div>
       <div class="history-items" role="list"></div>
     </div>

     <!-- Color Palette -->
     <div id="colorPalette" class="color-palette" style="display: none;">
         <div class="color-palette-header">
             Seleccionar Color
             <div class="selection-counter">0 seleccionados</div>
         </div>
         <div class="color-palette-items">
             <div class="color-item me" data-color="me" data-tooltip="Acción /me"></div>
             <div class="color-item do" data-color="do" data-tooltip="Acción /do"></div>
             <div class="color-item white" data-color="white" data-tooltip="Diálogo"></div>
             <div class="color-item lightgrey" data-color="lightgrey" data-tooltip="Diálogo secundario"></div>
             <div class="color-item success" data-color="success" data-tooltip="Éxito"></div>
             <div class="color-item fail" data-color="fail" data-tooltip="Fallo"></div>
             <div class="color-item radioColor" data-color="radioColor" data-tooltip="Radio"></div>
             <div class="color-item custom-color-wrapper" data-tooltip="Color personalizado">
                 <input type="color" id="customColorPicker" value="#ffffff" aria-label="Elegir color personalizado" title="Elegir color personalizado">
             </div>
         </div>
     </div>

     <!-- Changelog tab -->
     <div class="changelog-tab" 
          role="button" 
          tabindex="0" 
          aria-label="Abrir changelog" 
          aria-expanded="false">
       <i class="fas fa-list" aria-hidden="true"></i>
     </div>

     <div id="changelogPanel" 
          class="changelog-panel" 
          role="dialog" 
          aria-label="Changelog" 
          aria-hidden="true">
       <div class="changelog-header">
         <h3>Últimas Actualizaciones</h3>
       </div>
       <div class="changelog-items" role="list"></div>
     </div>

     <script src="js/changelog-data.js" defer></script>
     <script src="js/changelog.js" defer></script>

     <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize ColorPalette after all scripts have loaded
            if (typeof ColorPalette !== 'undefined') {
                ColorPalette.init();
            } else {
                // If ColorPalette isn't ready yet, wait a bit
                setTimeout(function() {
                    if (typeof ColorPalette !== 'undefined') {
                        ColorPalette.init();
                    }
                }, 100);
            }
        });
     </script>
 </body>
</html>
